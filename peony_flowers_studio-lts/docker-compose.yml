version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: peony
      POSTGRES_PASSWORD: peony_pass
      POSTGRES_DB: peony_flowers
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./apps/backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - ./apps/backend/.env
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
