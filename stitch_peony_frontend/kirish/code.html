                    "secondary": "#57624c",

                    "on-tertiary": "#ffffff",
                    "on-tertiary-fixed-variant": "#434842",
                    "on-tertiary-container": "#c8ccc4",
                    "on-secondary-fixed": "#151e0d",

                    "outline": "#877274",
                    "on-primary-fixed-variant": "#792c3d",
                    "on-secondary-fixed-variant": "#404a36",
                    "surface-dim": "#e7d6da",

<style>
        body {
            background-color: #fff8f8;
            color: #22191c;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
        .botanical-sketch {
            opacity: 0.04;
            pointer-events: none;
            position: absolute;
            z-index: 0;
        }
        .editorial-shadow {
            box-shadow: 0 4px 20px -4px rgba(111, 36, 53, 0.08);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md text-body-md overflow-x-hidden">
<!-- Top Navigation Suppression (Transactional Page Policy) -->
<!-- As per rule: Suppress navigation shell for Login/Transactional pages -->
<main class="flex-grow flex items-center justify-center relative px-margin-mobile py-section-padding">
<!-- Subtle Botanical Watermark Background -->
<div class="botanical-sketch top-0 right-0 transform translate-x-1/4 -translate-y-1/4">
<svg height="600" viewBox="0 0 200 200" width="600" xmlns="http://www.w3.org/2000/svg">
<path d="M100,20 C120,40 160,30 170,70 C180,110 140,140 100,180 C60,140 20,110 30,70 C40,30 80,40 100,20" fill="none" stroke="#6f2435" stroke-width="0.5"></path>
<path d="M100,40 C110,55 130,50 140,75 C150,100 130,120 100,150 C70,120 50,100 60,75 C70,50 90,55 100,40" fill="none" stroke="#6f2435" stroke-width="0.3"></path>
</svg>
</div>
<!-- Login Card -->
<div class="w-full max-w-[380px] bg-surface border border-outline-variant rounded-xl p-stack-lg relative z-10 editorial-shadow">
<!-- Branding -->
<div class="text-center mb-stack-lg">
<h1 class="font-display-lg text-primary italic mb-unit">Peony</h1>
<div class="w-12 h-px bg-outline-variant mx-auto mb-stack-md"></div>
<span class="font-headline-sm text-on-surface-variant italic block opacity-70">Xush kelibsiz</span>
<h2 class="font-headline-md text-on-surface mt-unit">Kirish</h2>
</div>
<!-- Login Form -->
<form class="space-y-stack-md" id="loginForm">
<!-- Phone Input -->
<div class="space-y-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="phone">Telefon raqami</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined">call</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all" id="phone" name="phone" placeholder="+998 90 000 00 00" type="tel">
</div>
</div>
<!-- OTP Input Section (Hidden until phone is entered - Mock UX) -->
<div class="space-y-unit opacity-40 pointer-events-none transition-opacity duration-300" id="otpSection">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="otp">Tasdiqlash kodi</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined">lock_open</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all" id="otp" maxlength="4" name="otp" placeholder="0000" type="text">
</div>
<div class="flex justify-between items-center mt-unit">
<span class="text-xs text-on-surface-variant">Kodni kutish: <span id="timer">01:59</span></span>
<button class="text-xs text-primary hover:underline font-semibold" type="button">Qayta yuborish</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-on-primary py-3 px-6 rounded-lg font-label-sm text-label-sm font-semibold hover:bg-primary-container transition-colors duration-300 shadow-sm flex items-center justify-center space-x-2" id="submitBtn" type="submit">
<span>Davom etish</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider & Secondary Action -->
<div class="mt-stack-lg pt-stack-md border-t border-outline-variant flex flex-col items-center">
<p class="text-on-surface-variant text-sm mb-stack-sm">Hisobingiz yo'qmi?</p>
<a class="font-label-sm text-label-sm text-primary font-semibold hover:underline transition-all" href="#">
                    Ro'yxatdan o'tish
                </a>
</div>
</div>
<!-- Decorative Floral Element (Bottom) -->
<div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex items-center space-x-4 opacity-20">
<div class="h-px w-20 bg-primary"></div>
<span class="material-symbols-outlined text-primary">local_florist</span>
<div class="h-px w-20 bg-primary"></div>
</div>
</main>
<!-- Simple Footer for Legal -->
<footer class="py-stack-md text-center">
<p class="font-label-caps text-[10px] text-on-surface-variant tracking-widest uppercase">
            © 2024 Peony Flowers Studio. Barcha huquqlar himoyalangan.
        </p>
</footer>
<!-- Interactive Logic -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const phoneInput = document.getElementById('phone');
            const otpSection = document.getElementById('otpSection');
            const submitBtn = document.getElementById('submitBtn');
            const timerSpan = document.getElementById('timer');
            let timerSeconds = 119;

            // Simple mask simulation
            phoneInput.addEventListener('input', (e) => {
                if(e.target.value.length >= 9) {
                    otpSection.classList.remove('opacity-40', 'pointer-events-none');
                } else {
                    otpSection.classList.add('opacity-40', 'pointer-events-none');
                }
            });

            // Submit logic simulation
            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                submitBtn.innerHTML = '<span class="animate-spin material-symbols-outlined">progress_activity</span>';
                setTimeout(() => {
                    submitBtn.innerHTML = 'Tasdiqlandi';
                    submitBtn.classList.remove('bg-primary');
                    submitBtn.classList.add('bg-secondary');
                }, 1200);
            });

            // Countdown timer simulation
            const countdown = setInterval(() => {
                const mins = Math.floor(timerSeconds / 60);
                const secs = timerSeconds % 60;
                timerSpan.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                if (timerSeconds > 0) timerSeconds--;
                else clearInterval(countdown);
            }, 1000);
        });
    </script>
</body></html>
