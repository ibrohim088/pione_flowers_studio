<script>
        function goToStep(step) {
            const stepPhone = document.getElementById('step-phone');
            const stepOtp = document.getElementById('step-otp');

            if (step === 2) {
                stepPhone.classList.remove('active-step');
                stepPhone.classList.add('hidden-step');
                
                setTimeout(() => {
                    stepOtp.classList.remove('hidden-step');
                    stepOtp.classList.add('active-step');
                    // Focus first OTP input
                    document.querySelector('.otp-input').focus();
                }, 100);
            } else {
                stepOtp.classList.remove('active-step');
                stepOtp.classList.add('hidden-step');
                
                setTimeout(() => {
                    stepPhone.classList.remove('hidden-step');
                    stepPhone.classList.add('active-step');
                }, 100);
            }
        }

        // Simple OTP auto-focus logic
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
